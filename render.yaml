services:
  - type: web
    name: jarvis-execution-core
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FALLBACK_MODELS
        value: llama-3.1-8b-instant
      - key: JARVIS_PUBLIC_MODE
        value: "true"
      - key: JARVIS_ALLOWED_ORIGINS
        value: "*"
      - key: JARVIS_REQUESTS_PER_MINUTE
        value: "20"
      - key: JARVIS_DIRECT_ROUTES
        value: "true"
      - key: JARVIS_HISTORY_MESSAGES
        value: "10"
      - key: JARVIS_MAX_COMPLETION_TOKENS
        value: "1200"
      - key: JARVIS_CACHE_TTL_SECONDS
        value: "3600"
      - key: JARVIS_DB_FILE
        value: jarvis_memory.db
      - key: JARVIS_MAX_RESOLUTION_ATTEMPTS
        value: "5"
      - key: JARVIS_WEB_SEARCH_ATTEMPTS
        value: "3"
      - key: JARVIS_WEB_SEARCH_RESULTS
        value: "10"
      - key: JARVIS_PROVIDER_TIMEOUT_SECONDS
        value: "45"
      - key: JARVIS_VERIFY_RESULTS
        value: "true"
      - key: JARVIS_ALWAYS_RETURN_RESULT
        value: "true"
      - key: JARVIS_OPENAI_COMPAT_BASE_URL
        sync: false
      - key: JARVIS_OPENAI_COMPAT_API_KEY
        sync: false
      - key: JARVIS_OPENAI_COMPAT_MODELS
        sync: false
      - key: JARVIS_OLLAMA_BASE_URL
        sync: false
      - key: JARVIS_OLLAMA_MODELS
        value: llama3.1:8b
