<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Reactor de energía JARVIS</title>
  <desc id="desc">Reactor circular futurista con núcleo triangular y luz cian.</desc>
  <defs>
    <radialGradient id="bgCore" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#d9fbff"/>
      <stop offset="0.22" stop-color="#6ee9ff"/>
      <stop offset="0.5" stop-color="#18bddd"/>
      <stop offset="0.76" stop-color="#08738a"/>
      <stop offset="1" stop-color="#021219"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#162a33"/>
      <stop offset="0.28" stop-color="#071116"/>
      <stop offset="0.55" stop-color="#27434c"/>
      <stop offset="0.78" stop-color="#050a0d"/>
      <stop offset="1" stop-color="#1c3038"/>
    </linearGradient>
    <linearGradient id="cyanStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d6fbff"/>
      <stop offset="0.3" stop-color="#55e8ff"/>
      <stop offset="0.68" stop-color="#00a8cc"/>
      <stop offset="1" stop-color="#8df4ff"/>
    </linearGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wideGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.82 0 0 0 0 1 0 0 0 0.65 0"/>
    </filter>
    <clipPath id="discClip"><circle cx="256" cy="256" r="207"/></clipPath>
  </defs>

  <circle cx="256" cy="256" r="194" fill="#12cff4" opacity=".18" filter="url(#wideGlow)" class="halo"/>
  <circle cx="256" cy="256" r="224" fill="#03090d" stroke="#092832" stroke-width="10"/>
  <circle cx="256" cy="256" r="213" fill="none" stroke="#38dcf5" stroke-width="4" opacity=".88" filter="url(#softGlow)"/>
  <circle cx="256" cy="256" r="199" fill="url(#metal)" stroke="#071419" stroke-width="12"/>
  <circle cx="256" cy="256" r="184" fill="#02080b" stroke="#16cbe8" stroke-width="4" opacity=".98"/>

  <g clip-path="url(#discClip)" class="rotor">
    <g fill="url(#metal)" stroke="url(#cyanStroke)" stroke-width="4" filter="url(#softGlow)">
      <path d="M229 76h54l19 82-34 24h-24l-34-24z"/>
      <path d="M229 76h54l19 82-34 24h-24l-34-24z" transform="rotate(45 256 256)"/>
      <path d="M229 76h54l19 82-34 24h-24l-34-24z" transform="rotate(90 256 256)"/>
      <path d="M229 76h54l19 82-34 24h-24l-34-24z" transform="rotate(135 256 256)"/>
      <path d="M229 76h54l19 82-34 24h-24l-34-24z" transform="rotate(180 256 256)"/>
      <path d="M229 76h54l19 82-34 24h-24l-34-24z" transform="rotate(225 256 256)"/>
      <path d="M229 76h54l19 82-34 24h-24l-34-24z" transform="rotate(270 256 256)"/>
      <path d="M229 76h54l19 82-34 24h-24l-34-24z" transform="rotate(315 256 256)"/>
    </g>
    <g fill="#baf8ff" opacity=".9" filter="url(#softGlow)">
      <path d="M241 94h30l10 48-19 14h-12l-19-14z"/>
      <path d="M241 94h30l10 48-19 14h-12l-19-14z" transform="rotate(45 256 256)"/>
      <path d="M241 94h30l10 48-19 14h-12l-19-14z" transform="rotate(90 256 256)"/>
      <path d="M241 94h30l10 48-19 14h-12l-19-14z" transform="rotate(135 256 256)"/>
      <path d="M241 94h30l10 48-19 14h-12l-19-14z" transform="rotate(180 256 256)"/>
      <path d="M241 94h30l10 48-19 14h-12l-19-14z" transform="rotate(225 256 256)"/>
      <path d="M241 94h30l10 48-19 14h-12l-19-14z" transform="rotate(270 256 256)"/>
      <path d="M241 94h30l10 48-19 14h-12l-19-14z" transform="rotate(315 256 256)"/>
    </g>
  </g>

  <circle cx="256" cy="256" r="130" fill="#030b0f" stroke="#28d7ef" stroke-width="5"/>
  <circle cx="256" cy="256" r="112" fill="url(#bgCore)" opacity=".22" filter="url(#wideGlow)"/>

  <g filter="url(#softGlow)">
    <path d="M256 145 357 327H155Z" fill="none" stroke="#74efff" stroke-width="14" stroke-linejoin="round"/>
    <path d="M256 171 332 312H180Z" fill="none" stroke="#0e91aa" stroke-width="11" stroke-linejoin="round"/>
    <path d="M256 198 304 288H208Z" fill="url(#bgCore)" stroke="#d5fbff" stroke-width="6" stroke-linejoin="round"/>
    <path d="M256 218 286 276H226Z" fill="#e7fdff" opacity=".95"/>
  </g>

  <circle cx="256" cy="256" r="76" fill="none" stroke="#8ef3ff" stroke-width="2" opacity=".5"/>
  <circle cx="256" cy="256" r="58" fill="none" stroke="#d8fbff" stroke-width="2" opacity=".32"/>
  <circle cx="256" cy="256" r="23" fill="#dffcff" filter="url(#softGlow)" class="corePulse"/>

  <g fill="none" stroke="#5eeaff" stroke-linecap="round" opacity=".7" class="outerTicks">
    <path d="M256 25v22"/><path d="M256 465v22"/>
    <path d="M25 256h22"/><path d="M465 256h22"/>
    <path d="m92 92 16 16"/><path d="m404 404 16 16"/>
    <path d="m420 92-16 16"/><path d="m108 404-16 16"/>
  </g>

  <style>
    .rotor { transform-origin: 256px 256px; animation: reactorRotor 32s linear infinite; }
    .outerTicks { transform-origin: 256px 256px; animation: reactorTicks 18s linear infinite reverse; }
    .corePulse { animation: reactorCore 2.8s ease-in-out infinite; }
    .halo { animation: reactorHalo 3.6s ease-in-out infinite; }
    @keyframes reactorRotor { to { transform: rotate(360deg); } }
    @keyframes reactorTicks { to { transform: rotate(360deg); } }
    @keyframes reactorCore { 0%,100%{opacity:.72;transform:scale(.92);transform-origin:256px 256px} 50%{opacity:1;transform:scale(1.08);transform-origin:256px 256px} }
    @keyframes reactorHalo { 0%,100%{opacity:.11} 50%{opacity:.28} }
    @media (prefers-reduced-motion: reduce) { .rotor,.outerTicks,.corePulse,.halo { animation:none!important; } }
  </style>
</svg>
