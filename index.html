<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. // NEURAL EXPRESSIVE HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Google+Sans+Code:wght@400;500;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- 1. LIBRERÍAS DE RENDERIZADO MARKDOWN, SINTAXIS Y MATEMÁTICAS -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        window.MathJax = {
            loader: { load: ['[tex]/ams'] },
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['\\[', '\\]']],
                packages: { '[+]': ['ams'] },
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            },
            chtml: {
                scale: 1,
                matchFontHeight: true
            },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg-dark: #070a13;
            --sidebar-bg: #0c111d;
            --sidebar-expanded-width: 288px;
            --sidebar-collapsed-width: 68px;
            --input-bg: #141b2d;
            --dropdown-bg: #121828;
            --stark-blue: #0088ff;
            --stark-cyan: #00d2ff;
            --stark-glow: rgba(0, 136, 255, 0.35);
            --text-main: #e1e7f0;
            --text-sub: #8c97a6;
            --font-inter: 'Google Sans', 'Google Sans Text', Arial, sans-serif;
            --font-editorial: 'Google Sans', 'Google Sans Text', Arial, sans-serif;
            --font-orbitron: 'Orbitron', sans-serif;
            --font-mono: 'Google Sans Code', 'Roboto Mono', Consolas, monospace;
            
            /* TOKENS NEURAL EXPRESSIVE */
            --ease-enter: cubic-bezier(.2, .8, .2, 1);
            --motion-fast: 160ms;
            --motion-standard: 280ms;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-inter);
            -webkit-tap-highlight-color: transparent;
        }

        /* 🎨 SCROLLBARS GRISES, OPACAS Y ELEGANTES (AL MARGEN DERECHO) */
        ::-webkit-scrollbar { width: 14px; height: 14px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(140, 151, 166, 0.65); /* Gris opaco bonito */
            border-radius: 10px;
            border: 4px solid var(--bg-dark); /* Este truco la empuja a la derecha y la hace flotar */
            transition: background-color 0.3s ease;
        }
        ::-webkit-scrollbar-thumb:hover { background-color: rgba(140, 151, 166, 0.95); }
        * { scrollbar-width: thin; scrollbar-color: rgba(140, 151, 166, 0.65) transparent; }

        html, body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* 🌊 FONDO DEGRADADO EN MOVIMIENTO (THINKING GLOW) */
        .jarvis-presence-bg {
            position: absolute;
            inset: -25%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.8;
            filter: blur(72px);
            background: radial-gradient(circle at 25% 35%, rgba(0, 136, 255, 0.16) 0%, transparent 38%),
                        radial-gradient(circle at 70% 30%, rgba(0, 210, 255, 0.12) 0%, transparent 42%),
                        radial-gradient(circle at 55% 65%, rgba(180, 90, 255, 0.08) 0%, transparent 38%);
            transition: opacity 500ms ease;
        }

        .jarvis-presence-bg.pulsing {
            opacity: 1;
            animation: aiGlowDrift 5s ease-in-out infinite alternate;
        }

        @keyframes aiGlowDrift {
            from { transform: translate3d(-2%, -1%, 0) scale(1); }
            to { transform: translate3d(3%, 2%, 0) scale(1.08); filter: blur(60px) brightness(1.3); }
        }

        /* 📌 BARRA LATERAL (SIDE DRAWER NEURAL EXPRESSIVE) */
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(4, 5, 8, 0.6); backdrop-filter: blur(4px);
            z-index: 18; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active { opacity: 1; pointer-events: auto; }

        .sidebar {
            width: var(--sidebar-collapsed-width); height: 100vh; height: 100dvh;
            background-color: var(--sidebar-bg); border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 14px 10px; z-index: 20; flex-shrink: 0; transition: width var(--motion-standard) var(--ease-enter);
            overflow: hidden; position: relative; white-space: nowrap;
        }

        .sidebar.expanded { width: var(--sidebar-expanded-width); box-shadow: 10px 0 30px rgba(0, 0, 0, 0.6); padding: 14px 16px; }

        .sidebar-header { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; height: 44px; margin-bottom: 24px; }
        .sidebar.expanded .sidebar-header { justify-content: flex-start; }

        .toggle-menu-btn {
            background: transparent; border: none; color: var(--text-sub); cursor: pointer;
            width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s ease; flex-shrink: 0;
        }
        .toggle-menu-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--stark-cyan); }
        .toggle-menu-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .sidebar-model-selector {
            display: none; align-items: center; gap: 6px; font-size: 0.95rem; font-weight: 600;
            color: var(--stark-cyan); cursor: pointer; padding: 6px 10px; border-radius: 10px;
            text-shadow: 0 0 10px var(--stark-glow); transition: background 0.2s ease;
        }
        .sidebar.expanded .sidebar-model-selector { display: flex; }
        .sidebar-model-selector:hover { background: rgba(255, 255, 255, 0.08); }
        .sidebar-model-selector svg { width: 18px; height: 18px; fill: currentColor; }

        .sidebar-menu-list { display: flex; flex-direction: column; gap: 8px; width: 100%; overflow-y: auto; flex: 1; align-items: center; }
        .sidebar.expanded .sidebar-menu-list { align-items: flex-start; }

        .menu-item-global {
            display: flex; align-items: center; justify-content: center; height: 42px; width: 42px;
            border-radius: 21px; color: var(--text-sub); cursor: pointer; transition: all 0.2s ease;
            font-size: 0.9rem; font-weight: 500; background: transparent; border: 1px solid transparent; flex-shrink: 0;
        }
        .menu-item-global.highlight { background: rgba(255, 255, 255, 0.03); border-color: rgba(0, 210, 255, 0.2); color: var(--text-main); }
        .sidebar.expanded .menu-item-global { width: 100%; justify-content: flex-start; padding: 0 14px; border-radius: 12px; height: 40px; }
        .menu-item-global:hover { background: rgba(0, 136, 255, 0.12); color: var(--stark-cyan); border-color: rgba(0, 210, 255, 0.3); }
        .menu-item-global svg { width: 20px; height: 20px; fill: currentColor; flex-shrink: 0; margin-right: 0; }
        .sidebar.expanded .menu-item-global svg { margin-right: 14px; }

        .menu-text { display: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar.expanded .menu-text { display: block; }

        .sidebar-search-input { background: transparent; border: none; outline: none; color: #ffffff; font-size: 0.88rem; width: 100%; display: none; }
        .sidebar.expanded .sidebar-search-input { display: block; }

        .sidebar-section-title { font-size: 0.72rem; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.8px; margin: 16px 0 8px 12px; display: none; }
        .sidebar.expanded .sidebar-section-title { display: block; }

        .menu-item-chat {
            display: flex; align-items: center; justify-content: center; height: 38px; width: 40px; padding: 0;
            border-radius: 10px; color: var(--text-sub); cursor: pointer; transition: all 0.2s ease; font-size: 0.86rem;
            margin: 0 auto; position: relative; overflow: hidden;
        }
        .sidebar.expanded .menu-item-chat { width: 100%; justify-content: space-between; padding: 0 8px 0 10px; }
        .menu-item-chat:hover, .menu-item-chat.active { background: rgba(255, 255, 255, 0.06); color: #ffffff; }

        .chat-title-content { display: flex; align-items: center; gap: 10px; overflow: hidden; flex: 1; justify-content: center; }
        .sidebar.expanded .chat-title-content { justify-content: flex-start; }
        .chat-title-content svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

        .chat-options-btn { background: transparent; border: none; color: var(--text-sub); cursor: pointer; width: 26px; height: 26px; border-radius: 50%; display: none; align-items: center; justify-content: center; }
        .sidebar.expanded .menu-item-chat:hover .chat-options-btn { display: flex; }
        .chat-options-btn:hover { background: rgba(255, 255, 255, 0.15); color: var(--stark-cyan); }
        .chat-options-btn svg { width: 16px; height: 18px; fill: currentColor; }

        .user-profile-bar {
            display: flex; align-items: center; justify-content: center; gap: 12px; padding: 8px 0; border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 10px; width: 100%; height: 48px; cursor: pointer; transition: background 0.2s ease; border-radius: 12px;
        }
        .user-profile-bar:hover { background: rgba(255, 255, 255, 0.05); }
        .sidebar.expanded .user-profile-bar { justify-content: flex-start; padding: 8px 10px; }

        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--stark-blue), var(--stark-cyan)); color: #ffffff;
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; box-shadow: 0 0 10px var(--stark-glow);
        }

        .user-info { display: none; flex-direction: column; overflow: hidden; }
        .sidebar.expanded .user-info { display: flex; }
        .user-name { font-size: 0.86rem; font-weight: 600; color: #ffffff; }
        .user-plan { font-size: 0.72rem; color: var(--stark-cyan); }

        .sidebar:not(.expanded) .menu-text, .sidebar:not(.expanded) .sidebar-section-title, .sidebar:not(.expanded) .user-info, .sidebar:not(.expanded) .chat-options-btn { display: none !important; }

        /* MENÚS FLOTANTES */
        .dropdown-menu {
            position: fixed; background: var(--dropdown-bg); border: 1px solid rgba(0, 210, 255, 0.2); border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); padding: 8px; display: none; flex-direction: column; gap: 2px; z-index: 100; min-width: 210px; backdrop-filter: blur(12px);
        }
        .dropdown-menu.active { display: flex; }
        .dropdown-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; font-size: 0.88rem; color: var(--text-main); border-radius: 10px; cursor: pointer; transition: all 0.18s ease; }
        .dropdown-item:hover { background: rgba(0, 136, 255, 0.15); color: var(--stark-cyan); }
        .dropdown-item svg { width: 18px; height: 18px; fill: currentColor; }
        .dropdown-item.danger:hover { background: rgba(255, 50, 50, 0.15); color: #ff5555; }

        /* 🪟 BOTTOM SHEET */
        .bottom-sheet-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(6px); z-index: 90; display: none; align-items: flex-end; justify-content: center; }
        .bottom-sheet-overlay.active { display: flex; }
        .bottom-sheet-content {
            width: 100%; max-width: 640px; background: #111728; border-top-left-radius: 28px; border-top-right-radius: 28px;
            border: 1px solid rgba(0, 210, 255, 0.25); padding: 24px; display: flex; flex-direction: column; gap: 18px; transform: translateY(100%); transition: transform 320ms var(--ease-enter);
        }
        .bottom-sheet-overlay.active .bottom-sheet-content { transform: translateY(0); }
        .sheet-handle { width: 40px; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; align-self: center; margin-bottom: 8px; }
        .sheet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .sheet-card {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 18px;
            padding: 16px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; color: var(--text-main); font-size: 0.8rem;
        }
        .sheet-card:hover { background: rgba(0, 136, 255, 0.15); border-color: var(--stark-cyan); color: #ffffff; }
        .sheet-card svg { width: 24px; height: 24px; fill: currentColor; }

        /* 🖥️ ÁREA PRINCIPAL CENTRAL */
        .main-content {
            flex: 1; height: 100vh; height: 100dvh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative; padding: 20px; z-index: 2; min-width: 0;
        }

        .chat-top-header { position: absolute; top: 16px; right: 22px; display: flex; align-items: center; gap: 14px; z-index: 10; }
        
        .top-options-btn {
            background: transparent; border: none; color: var(--text-sub); cursor: pointer; width: 36px; height: 36px;
            border-radius: 50%; display: none; align-items: center; justify-content: center; transition: all 0.2s ease;
        }
        .top-options-btn.active { display: flex; }
        .top-options-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--stark-cyan); }
        .top-options-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .hero-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; max-width: 760px; transition: all 0.6s var(--ease-enter);
        }
        .main-content.chat-mode .hero-container { position: absolute; bottom: 24px; }

        .welcome-title {
            font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 500; color: #e3e8f0; margin-bottom: 32px;
            text-align: center; opacity: 0; transform: translateY(14px); animation: geminiEntrance 0.6s var(--ease-enter) forwards;
        }
        @keyframes geminiEntrance { to { opacity: 1; transform: translateY(0); } }
        .welcome-title.hidden { display: none; }

        /* 💬 CONVERSACIÓN: TIPOGRAFÍA Y FORMATO EDITORIAL TIPO GEMINI */
        .chat-container {
            width: 100%; max-width: 840px; height: calc(100dvh - 160px); overflow-y: auto; display: none;
            flex-direction: column; gap: 30px; padding-top: 50px; padding-bottom: 20px; padding-right: 12px; scroll-behavior: smooth;
        }
        .chat-container.active { display: flex; }

        .message {
            max-width: 85%; font-size: 1rem; line-height: 1.68; word-break: break-word;
            padding: 16px 24px; animation: messageEnter 220ms var(--ease-enter);
            font-family: var(--font-editorial); color: #e8eaed; letter-spacing: 0.005em;
        }

        @keyframes messageEnter {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end; background: #1a2235; border: 1px solid rgba(0, 136, 255, 0.2);
            color: #ffffff; border-radius: 22px; border-bottom-right-radius: 6px;
            white-space: pre-wrap;
        }

        .jarvis-message {
            align-self: flex-start; background: transparent; border: none;
            padding: 0; max-width: 100%; box-shadow: none;
        }

        .jarvis-message p { margin: 0 0 13px; }
        .jarvis-message p:last-child { margin-bottom: 0; }
        .jarvis-message strong { font-weight: 600; color: #ffffff; }
        .jarvis-message h1, .jarvis-message h2, .jarvis-message h3 {
            font-family: var(--font-editorial); font-weight: 600; color: #f1f3f4; margin: 25px 0 12px;
            letter-spacing: -0.015em;
        }
        .jarvis-message h1:first-child, .jarvis-message h2:first-child, .jarvis-message h3:first-child { margin-top: 0; }
        .jarvis-message h1 { font-size: 1.45rem; }
        .jarvis-message h2 { font-size: 1.28rem; }
        .jarvis-message h3 { font-size: 1.12rem; }
        .jarvis-message ul, .jarvis-message ol { margin: 0 0 15px 22px; padding-left: 9px; }
        .jarvis-message li { margin-bottom: 7px; padding-left: 2px; }
        .jarvis-message li::marker { color: #a8c7fa; }
        .jarvis-message a { color: #a8c7fa; text-decoration: none; }
        .jarvis-message a:hover { text-decoration: underline; }
        .jarvis-message blockquote {
            margin: 15px 0; padding: 2px 0 2px 16px; border-left: 3px solid #a8c7fa; color: #bdc1c6;
        }
        .jarvis-message table {
            width: 100%; border-collapse: separate; border-spacing: 0; margin: 16px 0; border-radius: 14px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.12);
        }
        .jarvis-message th, .jarvis-message td { border-right: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 11px 14px; text-align: left; }
        .jarvis-message th:last-child, .jarvis-message td:last-child { border-right: none; }
        .jarvis-message tr:last-child td { border-bottom: none; }
        .jarvis-message th { background: rgba(255,255,255,0.06); color: #fff; font-weight: 600; }

        /* 🧮 Fórmulas: se muestran como ecuaciones, nunca como texto LaTeX roto */
        .jarvis-message mjx-container {
            font-size: 108% !important; color: #f1f3f4; max-width: 100%;
        }
        .jarvis-message mjx-container[display="true"] {
            display: block; overflow-x: auto; overflow-y: hidden; margin: 17px 0 !important; padding: 17px 20px;
            background: #141820; border: 1px solid rgba(255,255,255,0.09); border-radius: 16px;
        }

        /* 💻 Bloques de código inspirados en Gemini */
        .code-block-container {
            background: #13161c; border: 1px solid rgba(255, 255, 255, 0.10); border-radius: 16px;
            margin: 17px 0; overflow: hidden; font-family: var(--font-mono); box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        }
        .code-block-header {
            min-height: 44px; display: flex; justify-content: space-between; align-items: center;
            background: #1b1f27; padding: 9px 14px 9px 17px; border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .code-block-lang {
            font-family: var(--font-editorial); font-size: 0.78rem; color: #bdc1c6; font-weight: 500;
            text-transform: lowercase; letter-spacing: 0.01em;
        }
        .code-block-copy {
            background: transparent; border: none; color: #bdc1c6; font-family: var(--font-editorial); font-size: 0.78rem;
            font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 7px; padding: 7px 9px;
            border-radius: 18px; transition: background 0.18s ease, color 0.18s ease;
        }
        .code-block-copy:hover { color: #ffffff; background: rgba(255,255,255,0.08); }
        .code-block-container pre { margin: 0; padding: 18px 20px 20px; overflow-x: auto; background: transparent !important; tab-size: 4; }
        .code-block-container code {
            font-family: var(--font-mono); font-size: 0.91rem; line-height: 1.62; color: #e8eaed; white-space: pre;
        }

        .jarvis-message p > code, .jarvis-message li > code, .jarvis-message td > code {
            background: rgba(168, 199, 250, 0.11); border: 1px solid rgba(168, 199, 250, 0.12);
            padding: 2px 6px; border-radius: 6px; font-family: var(--font-mono); font-size: 0.88em; color: #c2e7ff;
        }

        .jarvis-reveal-block { animation: geminiBlockReveal 260ms var(--ease-enter) both; }
        @keyframes geminiBlockReveal {
            from { opacity: 0; transform: translateY(5px); filter: blur(1.5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* 🔮 ANIMACIÓN PENSANDO TIPO GEMINI (3 PUNTOS ONDULANTES) */
        .thinking-container { display: none; align-items: center; gap: 12px; margin-top: 10px; align-self: flex-start; }
        .thinking-container.active { display: flex; }
        .thinking-dots { display: inline-flex; align-items: center; gap: 6px; min-height: 24px; }
        .thinking-dots span {
            width: 8px; height: 8px; border-radius: 50%; background: var(--stark-cyan); opacity: .45;
            animation: dotWave 1.15s ease-in-out infinite; box-shadow: 0 0 8px var(--stark-cyan);
        }
        .thinking-dots span:nth-child(2) { animation-delay: 120ms; }
        .thinking-dots span:nth-child(3) { animation-delay: 240ms; }
        @keyframes dotWave {
            0%, 60%, 100% { transform: translateY(0) scale(.9); opacity: .4; }
            30% { transform: translateY(-5px) scale(1.1); opacity: 1; filter: brightness(1.5); }
        }
        .thinking-text { font-size: 0.9rem; color: var(--stark-cyan); font-weight: 500; opacity: 0.8; animation: pulseText 2s infinite; }
        @keyframes pulseText { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        /* 🧠 TRAZA DE HERRAMIENTAS AUTÓNOMAS */
        .tool-trace { align-self: flex-start; display: flex; flex-wrap: wrap; gap: 8px; margin: -12px 0 4px; max-width: 100%; }
        .tool-chip { display: inline-flex; align-items: center; gap: 7px; padding: 7px 11px; border-radius: 999px; background: rgba(0, 136, 255, 0.09); border: 1px solid rgba(0, 210, 255, 0.18); color: #b9dfff; font-size: .76rem; }
        .tool-chip.failed { background: rgba(255, 80, 80, .08); border-color: rgba(255, 80, 80, .2); color: #ffb4b4; }
        .tool-chip-dot { width: 7px; height: 7px; border-radius: 50%; background: #44d17a; box-shadow: 0 0 8px rgba(68,209,122,.65); }
        .tool-chip.failed .tool-chip-dot { background: #ff6565; }
        .jarvis-toast { position: fixed; right: 22px; bottom: 22px; z-index: 150; max-width: 360px; padding: 14px 16px; border-radius: 15px; background: #151d2d; border: 1px solid rgba(0,210,255,.25); box-shadow: 0 16px 45px rgba(0,0,0,.45); color: #eef5ff; transform: translateY(20px); opacity: 0; pointer-events: none; transition: .25s ease; }
        .jarvis-toast.active { transform: translateY(0); opacity: 1; }
        .upload-status { font-size: .78rem; color: var(--stark-cyan); text-align: center; min-height: 18px; }

        /* 💊 PÍLDORA COMPOSITOR "ASK J.A.R.V.I.S." */
        .input-container {
            width: 100%; max-width: 760px; background: var(--input-bg); border-radius: 32px;
            padding: 8px 14px; display: flex; align-items: center; gap: 10px;

    <script>
        // MARKDOWN, CÓDIGO Y MATEMÁTICAS CON RENDERIZADO SEGURO
        const renderer = new marked.Renderer();

        function escaparHtml(valor) {
            return String(valor)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        renderer.code = function(codeOrToken, infoString) {
            const code = typeof codeOrToken === 'object' ? codeOrToken.text : codeOrToken;
            const requestedLanguage = typeof codeOrToken === 'object' ? codeOrToken.lang : infoString;
            const language = String(requestedLanguage || 'plaintext').trim().split(/\s+/)[0].toLowerCase();
            const validLang = hljs.getLanguage(language) ? language : 'plaintext';
            const highlighted = hljs.highlight(String(code), { language: validLang }).value;

            return `
            <div class="code-block-container">
                <div class="code-block-header">
                    <span class="code-block-lang">${escaparHtml(validLang)}</span>
                    <button class="code-block-copy" type="button" aria-label="Copiar código">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        <span>Copiar código</span>
                    </button>
                </div>
                <pre><code class="hljs language-${escaparHtml(validLang)}">${highlighted}</code></pre>
            </div>`;
        };

        marked.setOptions({ renderer, breaks: true, gfm: true });

        function normalizarSalidaIA(texto) {
            let limpio = String(texto ?? '').replace(/\r\n/g, '\n');
            limpio = limpio.replace(/\$\$([\s\S]*?)\$\$/g, (_, formula) => `\\[\n${formula.trim()}\n\\]`);
            limpio = limpio.replace(/\$([^$\n]+)\$/g, (coincidencia, formula) => {
                const contenido = formula.trim();
                const pareceMatematica = /\\[a-zA-Z]+|[_^={}]/.test(contenido) || /^[a-zA-Z]$/.test(contenido);
                return pareceMatematica ? `\\(${contenido}\\)` : coincidencia;
            });
            return limpio;
        }

        function protegerMatematicas(markdown) {
            const formulas = [];
            let protegido = markdown;

            protegido = protegido.replace(/\\\[([\s\S]*?)\\\]/g, (_, contenido) => {
                const token = `JARVIS_MATH_BLOCK_${formulas.length}_TOKEN`;
                formulas.push({ token, contenido, display: true });
                return token;
            });

            protegido = protegido.replace(/\\\(([\s\S]*?)\\\)/g, (_, contenido) => {
                const token = `JARVIS_MATH_INLINE_${formulas.length}_TOKEN`;
                formulas.push({ token, contenido, display: false });
                return token;
            });

            return { protegido, formulas };
        }

        function renderizarMarkdownSeguro(texto, yaNormalizado = false) {
            const normalizado = yaNormalizado ? texto : normalizarSalidaIA(texto);
            const { protegido, formulas } = protegerMatematicas(normalizado);
            const htmlMarcado = marked.parse(protegido);
            let htmlSeguro = DOMPurify.sanitize(htmlMarcado, {
                USE_PROFILES: { html: true },
                ADD_ATTR: ['class', 'aria-label', 'type']
            });

            formulas.forEach(({ token, contenido, display }) => {
                const formulaSegura = escaparHtml(contenido.trim());
                const delimitada = display ? `\\[${formulaSegura}\\]` : `\\(${formulaSegura}\\)`;
                htmlSeguro = htmlSeguro.split(token).join(delimitada);
            });
            return htmlSeguro;
        }

        async function procesarMatematicas(elemento) {
            try {
                if (!window.MathJax) return;
                if (window.MathJax.startup?.promise) await window.MathJax.startup.promise;
                if (!window.MathJax.typesetPromise) return;
                if (window.MathJax.typesetClear) window.MathJax.typesetClear([elemento]);
                await window.MathJax.typesetPromise([elemento]);
            } catch (error) {
                console.warn('No se pudo renderizar una ecuación:', error);
            }
        }

        document.addEventListener('click', (event) => {
            const copyButton = event.target.closest('.code-block-copy');
            if (copyButton) copiarCodigo(copyButton);
        });

        async function copiarCodigo(btn) {
            const pre = btn.closest('.code-block-container')?.querySelector('pre');
            const code = pre?.innerText || '';
            const originalHTML = btn.innerHTML;
            try {
                await navigator.clipboard.writeText(code);
                btn.innerHTML = '✅ <span>Copiado</span>';
            } catch (error) {
                const area = document.createElement('textarea');
                area.value = code;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                btn.innerHTML = '✅ <span>Copiado</span>';
            }
            setTimeout(() => { btn.innerHTML = originalHTML; }, 1800);
        }

        const API_BASE = "https://jarvis-ai-hud.onrender.com";
        const API_URL = `${API_BASE}/api/jarvis`;

        const SVG_SEND = `<path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>`;

        function obtenerSessionId() {

                sid = "stark_user_" + Math.random().toString(36).substring(2, 9);
                localStorage.setItem("jarvis_session_id", sid);

            let chatsObj = JSON.parse(localStorage.getItem("jarvis_chats_db") || "{}");
            chatsObj[sessionId] = { titulo: titulo, historial: historial, timestamp: Date.now() };
            localStorage.setItem("jarvis_chats_db", JSON.stringify(chatsObj));
            actualizarListaRecientes();

        function crearElementoChatReciente(chat, sidActual) {
            const item = document.createElement("div");
            item.className = "menu-item-chat" + (chat.id === sidActual ? " active" : "");
            const tituloSeguro = escaparHtml(chat.titulo || "Conversación");
            item.innerHTML = `
                <div class="chat-title-content">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>

                </div>
                <button class="chat-options-btn" title="Opciones">
                    <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                </button>
            `;
            item.querySelector('.chat-title-content').onclick = () => cargarConversacionExistente(chat.id);
            item.querySelector('.chat-options-btn').onclick = (e) => {
                e.stopPropagation();

        function renderizarChatsFiltrados(lista) {
            const sidActual = obtenerSessionId();

            ordenada.forEach(chat => recentChatsList.appendChild(crearElementoChatReciente(chat, sidActual)));
        }

        function actualizarListaRecientes() {
            const chatsObj = JSON.parse(localStorage.getItem("jarvis_chats_db") || "{}");
            const lista = Object.keys(chatsObj).map(id => ({ id, ...chatsObj[id] }));
            renderizarChatsFiltrados(lista);
        }

        function abrirContextMenuReciente(e, sessionId) {
            cerrarTodosContextMenus();
            chatSeleccionadoActual = sessionId;
            recentChatContextMenu.style.left = Math.min(e.clientX, window.innerWidth - 220) + "px";
            recentChatContextMenu.style.top = Math.min(e.clientY, window.innerHeight - 200) + "px";
            recentChatContextMenu.classList.add("active");
        }

        function abrirMenuSuperior(e) {
            cerrarTodosContextMenus();
            const rect = e.currentTarget.getBoundingClientRect();
            topHeaderContextMenu.style.right = (window.innerWidth - rect.right) + "px";
            topHeaderContextMenu.style.top = (rect.bottom + 8) + "px";
            topHeaderContextMenu.classList.add("active");
        }

        function cargarConversacionExistente(sessionId) {
            let chatsObj = JSON.parse(localStorage.getItem("jarvis_chats_db") || "{}");
            if (!chatsObj[sessionId]) return;

            localStorage.setItem("jarvis_session_id", sessionId);
            welcomeTitle.classList.add("hidden");
            chatBox.classList.add("active");
            mainContent.classList.add("chat-mode");
            topOptionsBtn.classList.add("active");

            chatBox.innerHTML = "";
            chatsObj[sessionId].historial.forEach(m => {
                if (m.role === "user") agregarMensajeUsuario(m.content);
                else if (m.role === "assistant") agregarMensajeJarvisDirecto(m.content);
            });

            actualizarListaRecientes();
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function accionRenombrarChat() {
            cerrarTodosContextMenus();
            let chatsObj = JSON.parse(localStorage.getItem("jarvis_chats_db") || "{}");
            let sid = chatSeleccionadoActual || obtenerSessionId();
            if (chatsObj[sid]) {
                let nuevo = prompt("Nuevo nombre para este chat:", chatsObj[sid].titulo);
                if (nuevo) {
                    chatsObj[sid].titulo = nuevo;
                    localStorage.setItem("jarvis_chats_db", JSON.stringify(chatsObj));
                    actualizarListaRecientes();
                }
            }
        }

        function accionEliminarChat() {
            cerrarTodosContextMenus();
            let sid = chatSeleccionadoActual || obtenerSessionId();
            let chatsObj = JSON.parse(localStorage.getItem("jarvis_chats_db") || "{}");
            delete chatsObj[sid];
            localStorage.setItem("jarvis_chats_db", JSON.stringify(chatsObj));
            if (sid === obtenerSessionId()) iniciarNuevoChat();
            else actualizarListaRecientes();
        }

        function filtrarChatsRecientes(query) {
            let chatsObj = JSON.parse(localStorage.getItem("jarvis_chats_db") || "{}");
            let lista = Object.keys(chatsObj).map(k => ({ id: k, ...chatsObj[k] }));
            const q = query.toLowerCase().trim();
            if (!q) renderizarChatsFiltrados(lista);
            else {
                const filtrados = lista.filter(t => t.titulo.toLowerCase().includes(q));
                renderizarChatsFiltrados(filtrados);
            }
        }

        actualizarListaRecientes();

        userInput.addEventListener("input", () => {
            if (isGenerating) return;
            if (userInput.value.trim().length > 0) {
                sendOrMicBtn.innerHTML = `<svg viewBox="0 0 24 24">${SVG_SEND}</svg>`;
            } else {
                sendOrMicBtn.innerHTML = `<svg viewBox="0 0 24 24">${SVG_MIC}</svg>`;
            }
        });

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") procesarBotonPrincipal(); });

        function procesarBotonPrincipal() {
            if (isGenerating) {
                if (currentRequestController) currentRequestController.abort();
                return;
            }
            if (userInput.value.trim().length > 0) enviarMensaje();
            else alert("Modo Dictado de Voz activado.");
        }

        function finalizarGeneracion() {
            isGenerating = false;
            currentRequestController = null;
            presenceBg.classList.remove("pulsing");
            typingIndicator.classList.remove("active");
            sendOrMicBtn.innerHTML = `<svg viewBox="0 0 24 24">${SVG_MIC}</svg>`;
            sendOrMicBtn.classList.remove("btn-stop");
            userInput.dispatchEvent(new Event("input"));
        }

        async function leerJsonSeguro(response) {
            const responseText = await response.text();
            let data = {};

            if (responseText.trim()) {
                try {
                    data = JSON.parse(responseText);
                } catch {
                    const preview = responseText.replace(/\s+/g, " ").slice(0, 240);
                    throw new Error(
                        `El backend respondió con contenido no válido. HTTP ${response.status}. Respuesta: ${preview}`
                    );
                }
            }

            if (!response.ok || data.status === "error") {
                throw new Error(
                    data.detail || data.reply || `El backend devolvió el error HTTP ${response.status}`
                );
            }

            return data;
        }

        async function enviarMensaje() {
            const texto = userInput.value.trim();
            if (!texto || isGenerating) return;

            isGenerating = true;
            currentRequestController = new AbortController();
            const timeoutId = setTimeout(() => currentRequestController?.abort(), 120000);

            sendOrMicBtn.innerHTML = `<svg viewBox="0 0 24 24">${SVG_STOP}</svg>`;
            sendOrMicBtn.classList.add("btn-stop");

            welcomeTitle.classList.add("hidden");
            chatBox.classList.add("active");
            mainContent.classList.add("chat-mode");
            topOptionsBtn.classList.add("active");

            agregarMensajeUsuario(texto);

            const sid = obtenerSessionId();
            const chatsObj = JSON.parse(localStorage.getItem("jarvis_chats_db") || "{}");
            const historialPrevio = chatsObj[sid] ? [...chatsObj[sid].historial] : [];
            historialPrevio.push({ role: "user", content: texto });

            const tituloChat = chatsObj[sid]
                ? chatsObj[sid].titulo
                : (texto.length > 24 ? texto.substring(0, 24) + "..." : texto);
            guardarHistorialChatLocal(sid, tituloChat, historialPrevio);

            userInput.value = "";
            presenceBg.classList.add("pulsing");
            const estadosPensamiento = [
                "Planificando la solicitud...",
                "Seleccionando herramientas...",
                "Verificando resultados...",
                "Consultando memoria..."
            ];
            thinkingText.innerText = estadosPensamiento[Math.floor(Math.random() * estadosPensamiento.length)];
            typingIndicator.classList.add("active");

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: texto, session_id: sid }),
                    signal: currentRequestController.signal
                });

                const data = await leerJsonSeguro(response);
                presenceBg.classList.remove("pulsing");
                typingIndicator.classList.remove("active");

                if (!data.reply) {
                    throw new Error("El backend respondió correctamente, pero no incluyó el campo reply.");
                }

                if (Array.isArray(data.tools) && data.tools.length) {
                    agregarTrazaHerramientas(data.tools);
                }

                await agregarMensajeJarvisCaracter(data.reply);
                historialPrevio.push({ role: "assistant", content: data.reply });
                guardarHistorialChatLocal(sid, tituloChat, historialPrevio);

            } catch (error) {
                const cancelled = error?.name === "AbortError";
                const detail = cancelled
                    ? "La solicitud fue cancelada o superó el tiempo máximo de espera."
                    : (error?.message || "Error desconocido");

                console.error("Error comunicando con J.A.R.V.I.S.:", error);
                presenceBg.classList.remove("pulsing");
                typingIndicator.classList.remove("active");

                const errorMessage =
                    `⚠️ **No fue posible completar la solicitud.**\n\n` +
                    `**Detalle técnico:** ${detail}\n\n` +
                    `Comprueba en este orden: \`/api/health\`, \`/api/capabilities\` y los registros del backend en Render.`;

                await agregarMensajeJarvisCaracter(errorMessage);
                historialPrevio.push({ role: "assistant", content: errorMessage });
                guardarHistorialChatLocal(sid, tituloChat, historialPrevio);
            } finally {
                clearTimeout(timeoutId);
                finalizarGeneracion();
            }
        }

        const TOOL_LABELS = {
            web_search: "🔎 Búsqueda web", calculator: "🧮 Calculadora", sympy_solve: "∑ Matemáticas",
            memory_save: "🧠 Memoria guardada", memory_search: "🧠 Memoria consultada", memory_delete: "🗑️ Memoria eliminada",
            reminder_create: "⏰ Recordatorio creado", reminder_list: "⏰ Recordatorios", reminder_cancel: "⏰ Recordatorio cancelado",
            current_datetime: "🕒 Hora actual", document_search: "📚 Biblioteca consultada"
        };

        function agregarTrazaHerramientas(tools) {
            const wrap = document.createElement("div");
            wrap.className = "tool-trace";
            tools.forEach(tool => {
                const chip = document.createElement("div");
                chip.className = `tool-chip ${tool.status === "failed" ? "failed" : ""}`;
                chip.innerHTML = `<span class="tool-chip-dot"></span><span>${TOOL_LABELS[tool.name] || tool.name}</span>`;
                wrap.appendChild(chip);
            });
            chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function mostrarToast(texto, duracion = 4500) {
            jarvisToast.textContent = texto;
            jarvisToast.classList.add("active");
            setTimeout(() => jarvisToast.classList.remove("active"), duracion);
        }

        async function mostrarCapacidades() {
            try {
                const res = await fetch(`${API_BASE}/api/capabilities`);
                const data = await leerJsonSeguro(res);
                const lista = (data.features || []).join(", ");
                mostrarToast(`JARVIS Autónomo ${data.version || ""}: ${lista}`);
            } catch (error) {
                mostrarToast(`No se pudieron consultar las capacidades: ${error.message}`);
            }
            cerrarBottomSheet();
        }

        function activarInvestigacion() {
            userInput.value = "Investiga profundamente este tema, contrasta fuentes y presenta conclusiones: ";
            userInput.focus();
            userInput.dispatchEvent(new Event("input"));
            cerrarBottomSheet();
        }

        function archivoABase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function subirArchivoBiblioteca(input) {
            const file = input.files?.[0];
            if (!file) return;
            if (file.size > 12 * 1024 * 1024) {
                uploadStatus.textContent = "El archivo supera 12 MB.";
                input.value = "";
                return;
            }
            uploadStatus.textContent = `Procesando ${file.name}...`;
            try {
                const file_b64 = await archivoABase64(file);
                const res = await fetch(`${API_BASE}/api/library/upload`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: obtenerSessionId(), file_name: file.name, file_b64 })
                });
                const data = await leerJsonSeguro(res);
                uploadStatus.textContent = `✅ ${file.name} añadido a la biblioteca`;
                mostrarToast(`Documento procesado: ${data.document.characters.toLocaleString()} caracteres.`);
            } catch (error) {
                uploadStatus.textContent = `⚠️ ${error.message}`;
            } finally { input.value = ""; }
        }

        async function revisarNotificaciones() {
            try {
                const res = await fetch(`${API_BASE}/api/notifications?session_id=${encodeURIComponent(obtenerSessionId())}`);
                const data = await leerJsonSeguro(res);
                if (data.notifications?.length) {
                    const r = data.notifications[0];
                    mostrarToast(`⏰ Recordatorio: ${r.title}`, 7000);
                }
            } catch (_) {}
        }
        setInterval(revisarNotificaciones, 60000);
        setTimeout(revisarNotificaciones, 2500);

        function agregarMensajeUsuario(texto) {
            const msgDiv = document.createElement("div");
            msgDiv.className = "message user-message";
            msgDiv.innerText = texto;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        /* ✍️ RENDERIZADO COMPLETO PARA CONVERSACIONES GUARDADAS */
        async function agregarMensajeJarvisDirecto(texto) {
            const msgDiv = document.createElement("div");
            msgDiv.className = "message jarvis-message";
            msgDiv.innerHTML = renderizarMarkdownSeguro(texto);
            chatBox.appendChild(msgDiv);
            await procesarMatematicas(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        /* ✨ Aparición progresiva por bloques completos: no rompe fórmulas ni código */
        async function agregarMensajeJarvisCaracter(texto) {
            const msgDiv = document.createElement("div");
            msgDiv.className = "message jarvis-message";
            chatBox.appendChild(msgDiv);

            const normalizado = normalizarSalidaIA(texto);
            const tokens = marked.lexer(normalizado);

            for (const token of tokens) {
                const raw = token.raw || token.text || '';
                if (!raw.trim()) continue;

                const bloque = document.createElement("div");
                bloque.className = "jarvis-reveal-block";
                bloque.innerHTML = renderizarMarkdownSeguro(raw, true);
                msgDiv.appendChild(bloque);
                await procesarMatematicas(bloque);
                chatBox.scrollTop = chatBox.scrollHeight;

                const pausa = token.type === 'code' ? 90 : token.type === 'heading' ? 65 : 45;
                await new Promise(resolve => setTimeout(resolve, pausa));
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
