<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>J.A.R.V.I.S. // STARK HUD MK-IV</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        :root {
            --cyan: #00f2fe; --amber: #ffb700; --green: #00ff88; --red: #ff3366;
            --bg: #05070a; --glass: rgba(10, 15, 25, 0.7);
            --border: rgba(0, 242, 254, 0.2);
        }

        body { 
            background: var(--bg); color: #fff; margin: 0; 
            font-family: 'Roboto Mono', monospace; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Estructura Principal */
        .hud-container {
            width: 95vw; height: 90vh; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 20px; display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5); position: relative;
        }

        /* Header con estética Stark */
        .hud-header {
            padding: 20px 30px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .title-brand { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        /* Reactor Central */
        .reactor { width: 30px; height: 30px; border: 2px solid var(--cyan); border-radius: 50%; box-shadow: 0 0 15px var(--cyan); animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Chat */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 10px; max-width: 70%; line-height: 1.6; }
        .user { align-self: flex-end; background: rgba(0, 242, 254, 0.1); border-left: 3px solid var(--cyan); }
        .bot { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border-left: 3px solid var(--green); }

        /* Input Moderno */
        .input-zone { padding: 20px; display: flex; gap: 10px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.3); }
        input { flex: 1; background: transparent; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--cyan); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="hud-header">
            <div class="title-brand">J.A.R.V.I.S. // STARK-HUD</div>
            <div class="reactor"></div>
        </div>

        <div class="chat-area" id="chatBox">
            <div class="msg bot">Inicializando sistemas Stark... Conectado. ¿Qué orden tiene para mí, señor?</div>
        </div>

        <div class="input-zone">
            <input type="text" id="userInput" placeholder="Comando de voz o texto...">
            <button onclick="enviarMensaje()">EJECUTAR</button>
        </div>
    </div>

    <script>
        async function enviarMensaje() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            if (!input.value) return;

            // Renderizado visual simple
            const userDiv = document.createElement("div");
            userDiv.className = "msg user";
            userDiv.innerText = input.value;
            chatBox.appendChild(userDiv);

            const msg = input.value;
            input.value = "";

            // Llamada al backend
            const res = await fetch("https://jarvis-ai-hud.onrender.com/api/jarvis", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();

            const botDiv = document.createElement("div");
            botDiv.className = "msg bot";
            botDiv.innerText = data.reply;
            chatBox.appendChild(botDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
