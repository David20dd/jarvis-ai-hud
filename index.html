<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. // STARK HUD MK-VI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Librerías Necesarias -->
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }, svg: { fontCache: 'global' } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: true, theme: 'dark' });</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --stark-cyan: #00f2fe;
            --stark-cyan-dim: rgba(0, 242, 254, 0.4);
            --stark-amber: #ffb700;
            --stark-green: #00ff88;
            --stark-red: #ff3366;
            --stark-dark-bg: #020509;
            --stark-glass: rgba(10, 20, 35, 0.9);
            --stark-border: rgba(0, 242, 254, 0.25);
            --font-main: 'Share Tech Mono', monospace;
            --font-titles: 'Orbitron', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--stark-dark-bg);
            /* Gradiente central azulado sutil como en image_e427b6.png */
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 150, 255, 0.08) 0%, transparent 60%);
            color: #d1f7ff;
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
        }

        .jarvis-main-container {
            width: 100%; height: 100%; display: flex; flex-direction: column; position: relative;
        }

        /* 🔒 PORTADA BIOMÉTRICA (ESTILO image_e427b6.png) */
        .splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #010306; z-index: 999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .biometric-ring {
            width: 120px; height: 120px; border-radius: 50%;
            border: 2px dashed var(--stark-cyan); animation: spinRing 5s linear infinite;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.3); margin-bottom: 25px;
        }
        @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .splash-title { font-family: var(--font-titles); font-size: 1.5rem; letter-spacing: 3px; color: var(--stark-cyan); text-shadow: 0 0 15px var(--stark-cyan); }

        /* HEADER SUPERIOR (ESTILO image_e427b6.png) */
        .hud-header {
            width: 100%; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--stark-border); background: rgba(0,0,0,0.4); z-index: 10;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .stark-logo { font-family: var(--font-titles); font-weight: 900; color: var(--stark-cyan); font-size: 1.1rem; letter-spacing: 2px; }
        .system-status { font-size: 0.75rem; color: rgba(209, 247, 255, 0.6); }

        /* CANALES LATERALES DE TELEMETRÍA (ESTILO HUD) */
        .hud-side-bar {
            position: absolute; top: 70px; bottom: 70px; width: 60px;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            padding: 20px 0; border-radius: 10px; border: 1px solid var(--stark-border);
            background: rgba(10, 20, 35, 0.4); backdrop-filter: blur(5px);
        }
        .hud-left { left: 15px; }
        .hud-right { right: 15px; }
        .side-icon {
            width: 35px; height: 35px; border-radius: 6px;
            border: 1px solid var(--stark-border);
            display: flex; align-items: center; justify-content: center;
            color: var(--stark-cyan); cursor: pointer; transition: 0.3s;
        }
        .side-icon:hover { background: var(--stark-cyan); color: #000; box-shadow: 0 0 10px var(--stark-cyan); }

        /* ZONA CENTRAL DE CHAT (ESTILO image_e427b6.png) */
        .chat-container {
            flex: 1; width: 100%; max-width: 900px; margin: 0 auto;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding-bottom: 90px; /* Espacio para la barra de entrada */
            position: relative;
        }

        .chat-box {
            width: 100%; padding: 20px; overflow-y: auto; display: flex;
            flex-direction: column; gap: 20px;
        }
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--stark-border); }

        .message {
            max-width: 80%; padding: 12px 18px; border-radius: 8px;
            font-size: 0.95rem; line-height: 1.5; word-break: break-word;
        }
        .user-message {
            align-self: flex-end;
            background: rgba(0, 242, 254, 0.1); border: 1px solid var(--stark-cyan-dim);
            color: #fff; border-bottom-right-radius: 2px;
        }
        .jarvis-message {
            align-self: flex-start;
            background: rgba(10, 25, 45, 0.7); border: 1px solid rgba(209, 247, 255, 0.15);
            color: #d1f7ff; border-bottom-left-radius: 2px;
        }

        /* BARRA DE ENTRADA CENTRAL (ESTILO image_e427b6.png) */
        .input-wrapper {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 700px;
            display: flex; align-items: center; gap: 10px;
            padding: 10px 15px; border-radius: 30px; /* Esquinas muy redondeadas */
            background: rgba(15, 30, 50, 0.95);
            border: 1px solid var(--stark-border);
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            z-index: 5;
        }

        .stark-input {
            flex: 1; background: transparent; border: none; outline: none;
            color: #fff; font-size: 1rem; padding: 5px 0;
        }
        .stark-input::placeholder { color: rgba(209, 247, 255, 0.5); }

        .input-btn {
            width: 35px; height: 35px; border-radius: 50%; background: transparent;
            border: 1px solid transparent; color: var(--stark-cyan);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .input-btn:hover { background: rgba(0, 242, 254, 0.15); border-color: var(--stark-border); }

        /* NÚCLEO HOLOGRÁFICO 3D (Rediseñado para la barra de entrada) */
        #core3DCanvas {
            width: 30px; height: 30px; border-radius: 50%;
            border: 1px solid var(--stark-border); background: #000;
            filter: drop-shadow(0 0 5px var(--stark-cyan));
        }

    </style>
</head>
<body>

    <!-- 🔒 PORTADA BIOMÉTRICA (ESTILO image_e427b6.png) -->
    <div class="splash-screen" id="splashScreen">
        <div class="biometric-ring">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="#00f2fe">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8s0 0 0 0z"/>
            </svg>
        </div>
        <div class="splash-title">AUTENTICANDO CRISTIAN...</div>
    </div>

    <div class="jarvis-main-container">
        
        <!-- HEADER (ESTILO image_e427b6.png) -->
        <header class="hud-header">
            <div class="header-left">
                <span class="stark-logo">STARK INDUSTRIES</span>
                <span class="system-status" id="sys-status">J.A.R.V.I.S. MK-VI // ONLINE</span>
            </div>
            <div class="header-right">
                <!-- Iconos de la derecha como en la imagen -->
                <svg width="20" height="20" viewBox="0 0 24 24" fill="rgba(209, 247, 255, 0.6)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            </div>
        </header>

        <!-- CANAL LATERAL IZQUIERDO -->
        <aside class="hud-side-bar hud-left">
            <div class="side-icon"><span>T</span></div>
            <div class="side-icon"><span>D</span></div>
            <div class="side-icon"><span>M</span></div>
        </aside>

        <!-- ZONA CENTRAL DE CHAT -->
        <main class="chat-container">
            <div class="chat-box" id="chatBox">
                <div class="message jarvis-message">¿En qué puedo asistirle hoy, señor Cristian? Los sistemas Mark VI están a su disposición.</div>
            </div>

            <!-- BARRA DE ENTRADA CENTRALIZADA (FUSIÓN ESTILO image_e427b6.png Y STARK) -->
            <div class="input-wrapper">
                <!-- Adjuntar Archivo -->
                <button class="input-btn" onclick="document.getElementById('fileInput').click()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
                </button>
                <input type="file" id="fileInput" accept="*/*" multiple style="display:none;" onchange="procesarArchivosSeleccionados(event)">

                <!-- Entrada de Texto -->
                <input type="text" id="userInput" class="stark-input" placeholder="Pregunta lo que quieras, Cristian..." autocomplete="off">

                <!-- Micrófono -->
                <button class="input-btn" id="micBtn" onclick="toggleMicrofono()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>

                <!-- NÚCLEO HOLOGRÁFICO (Integrado como indicador de estado) -->
                <canvas id="core3DCanvas"></canvas>
            </div>
        </main>

        <!-- CANAL LATERAL DERECHO -->
        <aside class="hud-side-bar hud-right">
            <div class="side-icon"><span>⚙️</span></div>
            <div class="side-icon"><span>📊</span></div>
        </aside>

    </div>

    <script>
        // --- 🔒 LÓGICA DE PORTADA BIOMÉTRICA (image_e427b6.png) ---
        window.addEventListener("load", () => {
            setTimeout(() => {
                document.getElementById("splashScreen").classList.add("hidden");
                // Reproducir sonido de inicio de Stark Industries aquí
            }, 1500);
        });

        // --- 🌌 MOTOR DEL NÚCLEO HOLOGRÁFICO 3D (Integrado en barra) ---
        const coreCanvas = document.getElementById("core3DCanvas");
        const ctx3D = coreCanvas.getContext("2d");
        coreCanvas.width = 30; coreCanvas.height = 30;

        let numParticles = 15;
        let particles = [];
        let estadoCore = "ready"; // ready, processing, speaking, listening

        // Colores de estado
        const coreColors = { ready: "#00f2fe", processing: "#ffb700", speaking: "#00ff88", listening: "#ff3366" };

        for (let i = 0; i < numParticles; i++) {
            particles.push({
                angle: (i / numParticles) * Math.PI * 2,
                radius: 8 + Math.random() * 3,
                speed: 0.04 + Math.random() * 0.02,
                size: 1 + Math.random() * 1
            });
        }

        function render3DCore() {
            ctx3D.clearRect(0, 0, 30, 30);
            const cx = 15, cy = 15;
            let colorHex = coreColors[estadoCore];

            // Núcleo Central
            ctx3D.beginPath(); ctx3D.arc(cx, cy, 3, 0, Math.PI * 2);
            ctx3D.fillStyle = colorHex; ctx3D.fill();

            // Partículas orbitales 3D
            particles.forEach((p) => {
                p.angle += (estadoCore === "processing" ? p.speed * 2 : p.speed);
                let x = cx + Math.cos(p.angle) * p.radius;
                let y = cy + Math.sin(p.angle) * (p.radius * 0.4); // Elipse 3D

                ctx3D.beginPath(); ctx3D.arc(x, y, p.size, 0, Math.PI * 2);
                ctx3D.fillStyle = colorHex; ctx3D.fill();
            });

            requestAnimationFrame(render3DCore);
        }
        render3DCore();

        // --- LÓGICA DE CHAT Y ESTADOS (Simplificada) ---
        function setEstado(estado) {
            estadoCore = estado;
            // Actualizar texto del header si es necesario
        }

        // Simulación de respuesta de Jarvis
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = e.target.value;
                if (!text) return;
                
                // Mensaje Usuario
                const chatBox = document.getElementById('chatBox');
                chatBox.innerHTML += `<div class="message user-message">${text}</div>`;
                e.target.value = '';
                chatBox.scrollTop = chatBox.scrollHeight;

                // Jarvis Procesando
                setEstado("processing");

                setTimeout(() => {
                    // Jarvis Responde
                    chatBox.innerHTML += `<div class="message jarvis-message">Procesando solicitud, señor Cristian. Ejecutando análisis Mark VI...</div>`;
                    chatBox.scrollTop = chatBox.scrollHeight;
                    setEstado("speaking");
                    setTimeout(() => setEstado("ready"), 2000);
                }, 1500);
            }
        });
        
        // --- 🎤 LÓGICA DEL MICRÓFONO ---
        function toggleMicrofono() {
            const micBtn = document.getElementById('micBtn');
            if (estadoCore !== 'listening') {
                setEstado('listening');
                micBtn.style.color = '#ff3366';
                // Iniciar reconocimiento de voz aquí
            } else {
                setEstado('ready');
                micBtn.style.color = '#00f2fe';
                // Detener reconocimiento de voz aquí
            }
        }

    </script>
</body>
</html>
