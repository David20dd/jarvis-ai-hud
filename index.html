<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. // NEURAL EXPRESSIVE HUD</title>
    
    <!-- Fuentes tipo Gemini/Claude -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Renderizado Markdown y Código -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Renderizado Matemático LaTeX (MathJax) -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg-dark: #070a13;
            --text-main: #eceff4;
            --text-sub: #8c97a6;
            --stark-cyan: #00d2ff;
            /* Tipografía estilo Google */
            --font-editorial: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Estilos globales para renderizado de texto tipo Gemini */
        .jarvis-message {
            font-family: var(--font-editorial) !important;
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-main);
        }

        /* Bloques de código Gemini */
        .code-block-container { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; margin: 15px 0; overflow: hidden; }
        .code-block-header { background: #161b22; padding: 6px 12px; display: flex; justify-content: space-between; font-size: 0.75rem; color: #8b949e; }
        .code-block-copy { cursor: pointer; border: none; background: none; color: #8b949e; }
        .code-block-copy:hover { color: white; }
        pre { padding: 15px; overflow-x: auto; }

        /* Estilo de Ecuaciones MathJax */
        .MathJax { font-size: 1.1em !important; }
        
        /* ... El resto de tus estilos CSS (sidebar, inputs, etc) se mantienen iguales ... */
    </style>
</head>
<body>
    <!-- (Mantén aquí toda la estructura HTML de tu sidebar y main-content previa) -->

    <script>
        // Configuración avanzada de Marked con soporte para LaTeX
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            const validLang = hljs.getLanguage(language) ? language : 'plaintext';
            const highlighted = hljs.highlight(code, { language: validLang }).value;
            return `
            <div class="code-block-container">
                <div class="code-block-header">
                    <span>${validLang}</span>
                    <button class="code-block-copy" onclick="navigator.clipboard.writeText(\`${code.replace(/`/g, '\\`')}\`)">Copiar</button>
                </div>
                <pre><code class="hljs ${validLang}">${highlighted}</code></pre>
            </div>`;
        };
        marked.setOptions({ renderer: renderer, breaks: true });

        // Función para renderizar el mensaje con soporte de MathJax y Markdown
        function agregarMensajeJarvisCaracter(texto) {
            const msgDiv = document.createElement("div");
            msgDiv.className = "message jarvis-message";
            chatBox.appendChild(msgDiv);

            // Renderizar Markdown
            msgDiv.innerHTML = marked.parse(texto);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Renderizar MathJax para ecuaciones
            if (window.MathJax) {
                MathJax.typesetPromise([msgDiv]).catch((err) => console.log(err));
            }
        }
    </script>
</body>
</html>
