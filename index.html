<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. // STARK HUD MARK VI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg-dark: #06080d;
            --sidebar-bg: #080c14;
            --sidebar-expanded-width: 260px;
            --sidebar-collapsed-width: 68px;
            --input-bg: #121722;
            --card-jarvis-bg: #0d121d;
            --stark-blue: #0088ff;
            --stark-cyan: #00d2ff;
            --stark-glow: rgba(0, 136, 255, 0.35);
            --text-main: #e1e7f0;
            --text-sub: #8c97a6;
            --font-inter: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-inter);
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* 🌀 FONDO CON RESPLANDOR NEÓN UNIFORME Y PULSO SUAVE */
        .jarvis-presence-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 110, 255, 0.22) 0%, rgba(0, 210, 255, 0.07) 45%, rgba(6, 8, 13, 0) 80%);
            pointer-events: none;
            z-index: 1;
            animation: jarvisPulseBg 5s infinite alternate ease-in-out;
        }

        @keyframes jarvisPulseBg {
            0% { opacity: 0.7; }
            100% { opacity: 1.0; }
        }

        /* 📌 BARRA LATERAL ESTABILIZADA (Estilo Gemini / Stark HUD) */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(4, 5, 8, 0.6);
            backdrop-filter: blur(4px);
            z-index: 18;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar {
            width: var(--sidebar-collapsed-width);
            height: 100vh;
            height: 100dvh;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 14px 12px;
            z-index: 20;
            flex-shrink: 0;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            position: relative;
            white-space: nowrap;
        }

        .sidebar.expanded {
            width: var(--sidebar-expanded-width);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .sidebar-top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            margin-bottom: 24px;
        }

        .toggle-menu-btn {
            background: transparent;
            border: none;
            color: var(--text-sub);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .toggle-menu-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--stark-cyan);
        }

        .toggle-menu-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* ☢️ NAV CONTAINER REACTOR ARC MARK VI HD */
        .arc-nav-container {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #arcReactorNav {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.7));
            transition: transform 0.25s ease;
        }

        #arcReactorNav:hover { transform: scale(1.12); }

        /* BOTÓN NUEVA CONVERSACIÓN ESTILO GEMINI */
        .btn-new-chat {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 210, 255, 0.2);
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 24px;
            cursor: pointer;
            width: 100%;
            transition: all 0.25s ease;
            margin-bottom: 18px;
            font-size: 0.88rem;
            font-weight: 500;
        }

        .btn-new-chat:hover {
            background: rgba(0, 136, 255, 0.18);
            border-color: var(--stark-cyan);
            color: #ffffff;
            box-shadow: 0 0 14px var(--stark-glow);
        }

        .btn-new-chat svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

        .menu-item-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .sidebar.expanded .menu-item-text { opacity: 1; }

        .sidebar-menu-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            overflow-y: auto;
            flex: 1;
        }

        .sidebar-menu-list::-webkit-scrollbar { width: 4px; }
        .sidebar-menu-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .sidebar-section-title {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin: 14px 0 6px 10px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .sidebar.expanded .sidebar-section-title { opacity: 1; }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            border-radius: 12px;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.88rem;
            width: 100%;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--stark-cyan);
        }

        .menu-item svg { width: 20px; height: 20px; fill: currentColor; flex-shrink: 0; }

        /* PERFIL DE USUARIO EN LA PARTE INFERIOR */
        .user-profile-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 10px;
            width: 100%;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--stark-blue), var(--stark-cyan));
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
            box-shadow: 0 0 10px var(--stark-glow);
        }

        .user-info {
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.2s ease;
            overflow: hidden;
        }

        .sidebar.expanded .user-info { opacity: 1; }

        .user-name { font-size: 0.86rem; font-weight: 600; color: #ffffff; }
        .user-plan { font-size: 0.72rem; color: var(--stark-cyan); }

        /* 🖥️ ÁREA PRINCIPAL CENTRAL */
        .main-content {
            flex: 1;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            z-index: 2;
            min-width: 0;
        }

        .sys-status-text {
            position: absolute;
            top: 18px;
            right: 22px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--stark-cyan);
            letter-spacing: 1px;
            opacity: 0.85;
            text-shadow: 0 0 8px var(--stark-glow);
            z-index: 10;
            pointer-events: none;
        }

        .hero-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 720px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .main-content.chat-mode .hero-container {
            position: absolute;
            bottom: 20px;
        }

        .welcome-title {
            font-size: clamp(1.3rem, 4.5vw, 2.1rem);
            font-weight: 500;
            color: #e3e8f0;
            margin-bottom: 28px;
            letter-spacing: -0.4px;
            text-align: center;
            opacity: 0;
            transform: translateY(14px);
            animation: geminiEntrance 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            padding: 0 10px;
        }

        @keyframes geminiEntrance {
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-title.hidden { display: none; }

        /* 💬 ZONA DE CONVERSACIÓN CON TIPOGRAFÍA ESTILO GEMINI / CLAUDE */
        .chat-container {
            width: 100%;
            max-width: 780px;
            height: calc(100dvh - 150px);
            overflow-y: auto;
            display: none;
            flex-direction: column;
            gap: 20px;
            padding-top: 40px;
            padding-bottom: 20px;
            padding-right: 18px;
            scroll-behavior: smooth;
        }

        .chat-container.active { display: flex; }

        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.14);
            border-radius: 10px;
        }

        .message {
            max-width: 88%;
            font-size: 1rem;
            line-height: 1.7;
            word-break: break-word;
            padding: 16px 22px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: -0.1px;
        }

        .user-message {
            align-self: flex-end;
            background: #182030;
            border: 1px solid rgba(0, 136, 255, 0.3);
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .jarvis-message {
            align-self: flex-start;
            background: #0d121d;
            border: 1px solid rgba(0, 210, 255, 0.18);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 12px 18px;
            background: #0d121d;
            border: 1px solid rgba(0, 210, 255, 0.18);
            border-radius: 16px;
            width: fit-content;
            align-self: flex-start;
        }

        .typing-indicator.active { display: flex; }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--stark-cyan);
            border-radius: 50%;
            animation: typingPulse 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingPulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.4); opacity: 1; }
        }

        .preview-bar {
            display: none;
            margin-bottom: 10px;
            background: var(--input-bg);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--stark-cyan);
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--stark-cyan);
            z-index: 10;
            max-width: 720px;
            width: 100%;
        }
        .preview-bar.active { display: flex; }

        .input-container {
            width: 100%;
            max-width: 720px;
            background: var(--input-bg);
            border-radius: 28px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.07);
            transition: all 0.3s ease;
            position: relative;
        }

        .input-container:focus-within {
            border-color: rgba(0, 136, 255, 0.5);
            box-shadow: 0 8px 38px rgba(0, 0, 0, 0.8), 0 0 18px var(--stark-glow);
        }

        .stark-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 0.95rem;
            padding: 10px 4px;
            min-width: 0;
        }

        .stark-input::placeholder { color: #6c727e; }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-sub);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--stark-cyan);
        }

        .action-btn svg { width: 19px; height: 19px; fill: currentColor; }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.82rem;
            color: var(--text-sub);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 10px;
            user-select: none;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .model-selector:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--stark-cyan);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                width: var(--sidebar-expanded-width) !important;
            }
            .sidebar.mobile-open {
                transform: translateX(0);
            }
            .main-content { padding: 12px 10px; }
            .sys-status-text { font-size: 0.65rem; top: 12px; right: 14px; }
            .chat-container { padding-right: 10px; padding-left: 4px; gap: 14px; height: calc(100dvh - 135px); }
            .message { max-width: 95%; font-size: 0.94rem; padding: 12px 16px; }
            .input-container { padding: 4px 8px; gap: 6px; }
        }
    </style>
</head>
<body>

    <div class="jarvis-presence-bg"></div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- 📌 BARRA LATERAL DESPLEGABLE ESTILO GEMINI / STARK HUD -->
    <aside class="sidebar" id="sidebar">
        <div>
            <!-- CABECERA BARRA LATERAL UNIFICADA -->
            <div class="sidebar-top-bar">
                <button class="toggle-menu-btn" onclick="toggleSidebar()" title="Expandir/Colapsar Menú">
                    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </button>
                <div class="arc-nav-container">
                    <canvas id="arcReactorNav" title="Reactor Arc J.A.R.V.I.S. Mark VI"></canvas>
                </div>
            </div>

            <!-- BOTÓN NUEVA CONVERSACIÓN -->
            <button class="btn-new-chat" onclick="iniciarNuevoChat()">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <span class="menu-item-text">Nueva conversación</span>
            </button>

            <!-- MENÚ PRINCIPAL -->
            <div class="sidebar-menu-list">
                <div class="menu-item" onclick="iniciarNuevoChat()">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <span class="menu-item-text">Buscar conversaciones</span>
                </div>

                <div class="sidebar-section-title">Recientes</div>
                <div id="recentChatsList" style="display: flex; flex-direction: column; gap: 4px;">
                    <!-- Se cargan dinámicamente -->
                </div>
            </div>
        </div>

        <!-- PERFIL DE USUARIO CRISTIAN TERCERO EN LA PARTE INFERIOR -->
        <div class="user-profile-bar">
            <div class="user-avatar">CT</div>
            <div class="user-info">
                <span class="user-name">Cristian Tercero</span>
                <span class="user-plan">Pro // Stark Mark VI</span>
            </div>
        </div>
    </aside>

    <!-- 🖥️ ÁREA PRINCIPAL CENTRAL -->
    <main class="main-content" id="mainContent">

        <span class="sys-status-text" id="sysStatus">MARK VI // ONLINE</span>

        <div class="chat-container" id="chatBox"></div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="hero-container" id="heroContainer">
            <h1 class="welcome-title" id="welcomeTitle">Diseñemos algo increíble hoy, Cristian 🚀</h1>

            <div class="preview-bar" id="previewBar">
                <span id="previewText">Imagen/Archivo cargado</span>
                <span style="cursor:pointer;" onclick="cancelarArchivos()">✕</span>
            </div>

            <div class="input-container">
                <button class="action-btn" onclick="document.getElementById('fileInput').click()" title="Adjuntar imagen o archivo">
                    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
                <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="procesarArchivoSeleccionado(event)">

                <input type="text" id="userInput" class="stark-input" placeholder="Pregunta a Jarvis..." autocomplete="off">
                <div class="model-selector"><span>Mark VI</span></div>
                <button class="action-btn" id="micBtn"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
            </div>
        </div>

    </main>

    <script>
        const API_URL = "https://jarvis-ai-hud.onrender.com/api/jarvis";
        const mainContent = document.getElementById("mainContent");
        const chatBox = document.getElementById("chatBox");
        const userInput = document.getElementById("userInput");
        const welcomeTitle = document.getElementById("welcomeTitle");
        const previewBar = document.getElementById("previewBar");
        const previewText = document.getElementById("previewText");
        const fileInput = document.getElementById("fileInput");
        const sidebar = document.getElementById("sidebar");
        const sidebarOverlay = document.getElementById("sidebarOverlay");
        const typingIndicator = document.getElementById("typingIndicator");
        const recentChatsList = document.getElementById("recentChatsList");

        let archivoBase64 = null;
        let nombreArchivo = null;

        const mensajesEntrada = [
            "El micrófono es tuyo, Cristian 🎙️",
            "Hola, Cristian, ¿qué vamos a hacer hoy? ✨",
            "Manos a la obra, Cristian 🛠️",
            "¿Qué toca ahora, Cristian? 🚀",
            "¿Qué toca hoy, Cristian? 🔮",
            "Hola, Cristian, ¿qué tienes en mente? 💡",
            "Diseñemos algo increíble hoy, Cristian 🚀",
            "A tu señal, Cristian 🦾"
        ];
        welcomeTitle.innerText = mensajesEntrada[Math.floor(Math.random() * mensajesEntrada.length)];

        /* 🌌 REACTOR ARC CANVAS HD */
        const coreCanvas = document.getElementById("arcReactorNav");
        const ctx = coreCanvas.getContext("2d");
        coreCanvas.width = 80; coreCanvas.height = 80;

        let angleOuter = 0, angleInner = 0, pulseGlow = 0;

        function drawArcReactor() {
            ctx.clearRect(0, 0, 80, 80);
            const cx = 40, cy = 40;
            angleOuter += 0.02; angleInner -= 0.03; pulseGlow += 0.04;
            const pulseRadius = Math.sin(pulseGlow) * 1.5;

            ctx.save(); ctx.translate(cx, cy); ctx.rotate(angleOuter);
            ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI * 2); ctx.strokeStyle = "#080c14"; ctx.lineWidth = 5; ctx.stroke();
            for (let i = 0; i < 6; i++) {
                ctx.save(); ctx.rotate((i / 6) * Math.PI * 2); ctx.fillStyle = "#121824"; ctx.fillRect(-4.5, -38, 9, 6); ctx.restore();
            }
            ctx.restore();

            ctx.save(); ctx.translate(cx, cy);
            ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI * 2); ctx.fillStyle = "#0048aa"; ctx.fill();
            ctx.strokeStyle = "rgba(0, 210, 255, 0.4)"; ctx.lineWidth = 1;
            for (let x = -20; x <= 20; x += 8) {
                ctx.beginPath(); ctx.moveTo(x, -20); ctx.lineTo(x, 20); ctx.stroke();
            }
            ctx.restore();

            ctx.save(); ctx.translate(cx, cy); ctx.rotate(angleInner);
            ctx.beginPath(); ctx.arc(0, 0, 23, 0, Math.PI * 2); ctx.strokeStyle = "#00d2ff"; ctx.shadowColor = "#00d2ff"; ctx.shadowBlur = 10; ctx.lineWidth = 2.5; ctx.stroke();
            for (let i = 0; i < 8; i++) {
                ctx.beginPath(); ctx.arc(0, 0, 23, (i / 8) * Math.PI * 2, (i / 8) * Math.PI * 2 + 0.3); ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3; ctx.stroke();
            }
            ctx.restore();

            ctx.save(); ctx.translate(cx, cy);
            const radGrad = ctx.createRadialGradient(0, 0, 1, 0, 0, 15 + pulseRadius);
            radGrad.addColorStop(0, "#ffffff"); radGrad.addColorStop(0.4, "#00d2ff"); radGrad.addColorStop(0.85, "rgba(0, 136, 255, 0.6)"); radGrad.addColorStop(1, "transparent");
            ctx.fillStyle = radGrad; ctx.beginPath(); ctx.arc(0, 0, 15 + pulseRadius, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#ffffff"; ctx.shadowColor = "#00d2ff"; ctx.shadowBlur = 12; ctx.beginPath(); ctx.arc(0, 0, 5.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            requestAnimationFrame(drawArcReactor);
        }
        drawArcReactor();

        /* EXPANDIR / COLAPSAR BARRA LATERAL */
        function toggleSidebar() {
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle("mobile-open");
                sidebarOverlay.classList.toggle("active");
            } else {
                sidebar.classList.toggle("expanded");
            }
        }

        function obtenerSessionId() {
            let sid = localStorage.getItem("jarvis_session_id");
            if (!sid) {
                sid = "stark_user_" + Math.random().toString(36).substring(2, 9);
                localStorage.setItem("jarvis_session_id", sid);
            }
            return sid;
        }

        function iniciarNuevoChat() {
            localStorage.removeItem("jarvis_session_id");
            location.reload();
        }

        function actualizarListaRecientes(nuevoTitulo) {
            let recientes = JSON.parse(localStorage.getItem("jarvis_recientes") || "[]");
            if (nuevoTitulo && !recientes.includes(nuevoTitulo)) {
                recientes.unshift(nuevoTitulo);
                if (recientes.length > 8) recientes.pop();
                localStorage.setItem("jarvis_recientes", JSON.stringify(recientes));
            }

            recentChatsList.innerHTML = "";
            recientes.forEach(titulo => {
                const item = document.createElement("div");
                item.className = "menu-item";
                item.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg><span class="menu-item-text">${titulo}</span>`;
                item.onclick = () => {
                    if (window.innerWidth <= 768) toggleSidebar();
                };
                recentChatsList.appendChild(item);
            });
        }

        actualizarListaRecientes();

        function procesarArchivoSeleccionado(event) {
            const file = event.target.files[0];
            if (!file) return;
            nombreArchivo = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                archivoBase64 = e.target.result;
                previewText.innerText = `Imagen lista: ${nombreArchivo}`;
                previewBar.classList.add("active");
            };
            reader.readAsDataURL(file);
        }

        function cancelarArchivos() {
            archivoBase64 = null; nombreArchivo = null; fileInput.value = ""; previewBar.classList.remove("active");
        }

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") enviarMensaje(); });

        async function enviarMensaje() {
            const texto = userInput.value.trim();
            if (!texto && !archivoBase64) return;

            welcomeTitle.classList.add("hidden");
            chatBox.classList.add("active");
            mainContent.classList.add("chat-mode");

            let promptMostrar = texto;
            if (nombreArchivo) promptMostrar += ` [Adjunto: ${nombreArchivo}]`;

            agregarMensajeUsuario(promptMostrar);
            actualizarListaRecientes(texto ? texto.substring(0, 24) + "..." : "Imagen adjunta");

            const filesPayload = archivoBase64 ? [{ file_b64: archivoBase64, file_name: nombreArchivo }] : [];

            userInput.value = "";
            cancelarArchivos();

            typingIndicator.classList.add("active");

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: texto || "Por favor analiza la imagen adjunta.",
                        session_id: obtenerSessionId(),
                        files: filesPayload
                    })
                });

                const data = await response.json();
                typingIndicator.classList.remove("active");

                if (response.ok && data.reply) {
                    agregarMensajeJarvisCaracter(data.reply);
                } else {
                    agregarMensajeJarvisCaracter("A su servicio, señor. ¿En qué le puedo asistir hoy? ✨");
                }
            } catch (error) {
                typingIndicator.classList.remove("active");
                agregarMensajeJarvisCaracter("Sistemas sincronizados, señor. ¿Qué desea analizar? ⚡");
            }
        }

        function agregarMensajeUsuario(texto) {
            const msgDiv = document.createElement("div");
            msgDiv.className = "message user-message";
            msgDiv.innerText = texto;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function agregarMensajeJarvisCaracter(texto) {
            const msgDiv = document.createElement("div");
            msgDiv.className = "message jarvis-message";
            chatBox.appendChild(msgDiv);

            let index = 0;
            const velocidadEscritura = 12;

            function escribirCaracter() {
                if (index < texto.length) {
                    msgDiv.innerText += texto.charAt(index);
                    index++;
                    chatBox.scrollTop = chatBox.scrollHeight;
                    setTimeout(escribirCaracter, velocidadEscritura);
                } else {
                    if (window.MathJax) window.MathJax.typesetPromise([msgDiv]);
                }
            }

            escribirCaracter();
        }
    </script>
</body>
</html>
