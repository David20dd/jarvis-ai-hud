<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. // STARK HUD 3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --stark-cyan: #00f2fe;
            --stark-amber: #ffb700;
            --stark-green: #00ff88;
            --stark-red: #ff3366;
            --stark-dark: #06090e;
            --stark-glass: rgba(10, 20, 35, 0.85);
            --stark-border: rgba(0, 242, 254, 0.35);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Share Tech Mono', monospace; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--stark-dark);
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(0, 242, 254, 0.08) 0%, transparent 70%),
                linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 25px 25px, 25px 25px;
            color: #d1f7ff;
            height: 100vh;
            height: 100dvh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 0;
        }

        @media (min-width: 600px) { body { padding: 15px; } }

        .jarvis-container {
            width: 100%; 
            max-width: 900px; 
            height: 100vh;
            height: 100dvh;
            background: var(--stark-glass);
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--stark-border);
            border-radius: 0;
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.15);
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        @media (min-width: 600px) { .jarvis-container { height: 90vh; border-radius: 12px; } }

        .jarvis-header {
            padding: 12px 15px; 
            border-bottom: 1px solid var(--stark-border);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 600px) { .jarvis-header { padding: 18px 25px; } }

        .header-title {
            font-size: 0.95rem; 
            letter-spacing: 1.5px; 
            color: var(--stark-cyan);
            display: flex; 
            align-items: center; 
            gap: 10px;
        }

        @media (min-width: 600px) { .header-title { font-size: 1.1rem; letter-spacing: 2px; gap: 12px; } }

        .arc-reactor {
            width: 16px; 
            height: 16px; 
            border-radius: 50%;
            background: var(--stark-cyan);
            box-shadow: 0 0 14px var(--stark-cyan);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .arc-reactor.state-ready { background: var(--stark-cyan); box-shadow: 0 0 15px var(--stark-cyan); animation: pulseReady 2s infinite; }
        .arc-reactor.state-listening { background: var(--stark-red); box-shadow: 0 0 25px var(--stark-red); animation: pulseListening 0.8s infinite alternate; }
        .arc-reactor.state-processing { background: var(--stark-amber); box-shadow: 0 0 20px var(--stark-amber); animation: pulseSpin 0.8s infinite; }
        .arc-reactor.state-speaking { background: #ffffff; box-shadow: 0 0 25px #00f2fe, 0 0 40px #ffffff; animation: speakGlow 0.4s infinite alternate; }
        .arc-reactor.state-success { background: var(--stark-green); box-shadow: 0 0 20px var(--stark-green); }
        .arc-reactor.state-error { background: var(--stark-red); box-shadow: 0 0 25px var(--stark-red); animation: strobe 0.3s infinite; }

        @keyframes pulseReady { 0%, 100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
        @keyframes pulseListening { 0% { transform: scale(1); box-shadow: 0 0 10px var(--stark-red); } 100% { transform: scale(1.3); box-shadow: 0 0 30px var(--stark-red); } }
        @keyframes pulseSpin { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        @keyframes speakGlow { 0% { transform: scale(1); filter: brightness(1); } 100% { transform: scale(1.35); filter: brightness(1.6); } }
        @keyframes strobe { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        .status-badge { font-size: 0.75rem; color: rgba(209, 247, 255, 0.7); letter-spacing: 1px; text-align: right; }
        @media (min-width: 600px) { .status-badge { font-size: 0.85rem; } }

        .chat-box { flex: 1; padding: 15px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        @media (min-width: 600px) { .chat-box { padding: 25px; gap: 18px; } }

        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--stark-border); border-radius: 3px; }

        .message {
            max-width: 90%; padding: 12px 14px; border-radius: 8px;
            font-size: 0.9rem; line-height: 1.4; letter-spacing: 0.3px;
            white-space: pre-wrap; word-break: break-word;
        }
        @media (min-width: 600px) { .message { max-width: 85%; padding: 14px 18px; font-size: 0.95rem; line-height: 1.5; } }

        .user-message { align-self: flex-end; background: rgba(79, 172, 254, 0.15); border: 1px solid rgba(79, 172, 254, 0.4); color: #e6f7ff; border-bottom-right-radius: 2px; }
        .jarvis-message { align-self: flex-start; background: rgba(0, 242, 254, 0.08); border: 1px solid var(--stark-border); color: #d1f7ff; border-bottom-left-radius: 2px; }

        .code-block { background: #020408; border: 1px solid var(--stark-cyan); border-left: 4px solid var(--stark-cyan); border-radius: 4px; padding: 10px; margin: 8px 0; font-family: 'Consolas', monospace; color: #00ff88; overflow-x: auto; font-size: 0.82rem; }

        .hud-link-btn {
            display: inline-block; margin-top: 10px; padding: 8px 16px;
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.3), rgba(0, 255, 136, 0.3));
            border: 1px solid var(--stark-cyan); color: #ffffff; text-decoration: none;
            border-radius: 6px; font-weight: bold; font-size: 0.85rem; letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); transition: all 0.3s ease;
        }
        .hud-link-btn:hover { background: var(--stark-cyan); color: var(--stark-dark); box-shadow: 0 0 20px var(--stark-cyan); }

        /* PREVIEW DE IMAGEN ADJUNTADA EN EL ENCABEZADO DEL INPUT */
        .preview-bar {
            display: none; padding: 8px 15px; background: rgba(0, 0, 0, 0.7);
            border-top: 1px solid var(--stark-border); align-items: center; gap: 12px;
        }
        .preview-bar.active { display: flex; }
        .preview-thumb {
            width: 45px; height: 45px; border-radius: 4px; object-fit: cover;
            border: 1px solid var(--stark-cyan); box-shadow: 0 0 8px var(--stark-cyan);
        }
        .preview-info { flex: 1; font-size: 0.8rem; color: var(--stark-cyan); }
        .preview-close {
            background: transparent; border: none; color: var(--stark-red);
            font-size: 1.2rem; cursor: pointer; font-weight: bold; padding: 0 8px;
        }

        .chat-img-thumb {
            max-width: 100%; max-height: 220px; border-radius: 6px;
            margin-bottom: 8px; border: 1px solid var(--stark-cyan);
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.2); display: block;
        }

        /* CONTROLES DE ENTRADA */
        .input-panel { padding: 12px 12px; border-top: 1px solid var(--stark-border); background: rgba(0, 0, 0, 0.6); display: flex; gap: 8px; align-items: center; }
        @media (min-width: 600px) { .input-panel { padding: 18px 25px; gap: 12px; } }

        .stark-input { flex: 1; background: rgba(8, 11, 17, 0.9); border: 1px solid var(--stark-border); border-radius: 6px; padding: 12px 14px; color: var(--stark-cyan); font-size: 16px; outline: none; min-height: 44px; }

        .stark-btn { background: linear-gradient(135deg, rgba(0, 242, 254, 0.25), rgba(79, 172, 254, 0.25)); border: 1px solid var(--stark-cyan); color: var(--stark-cyan); padding: 0 16px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: all 0.3s ease; min-height: 44px; display: flex; align-items: center; justify-content: center; white-space: nowrap; }
        @media (min-width: 600px) { .stark-btn { padding: 0 22px; font-size: 0.9rem; } }
        .stark-btn:active, .stark-btn:hover { background: var(--stark-cyan); color: var(--stark-dark); font-weight: bold; }

        .icon-btn { width: 44px; min-width: 44px; padding: 0; border-radius: 6px; }
        .icon-btn svg { width: 20px; height: 20px; fill: var(--stark-cyan); transition: fill 0.3s ease; }

        .mic-btn.active {
            background: rgba(255, 51, 102, 0.25) !important; border-color: var(--stark-red) !important;
            box-shadow: 0 0 18px rgba(255, 51, 102, 0.6); animation: pulseMic 1s infinite alternate;
        }
        .mic-btn.active svg { fill: #ffffff !important; }
        @keyframes pulseMic { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
    </style>
</head>
<body>

    <div class="jarvis-container" id="mainContainer">
        <div class="jarvis-header">
            <div class="header-title">
                <div class="arc-reactor state-ready" id="reactor"></div>
                J.A.R.V.I.S. // HUD STARK 3.0
            </div>
            <div class="status-badge" id="sys-status">ONLINE</div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message jarvis-message">Sistemas en línea, señor Cristian. Interfaz holográfica Stark 3.0 activa. Módulos de Visión Multimodal en línea. ¿En qué puedo asistirlo hoy?</div>
        </div>

        <!-- BARRA DE PREVIEW DE IMAGEN ADJUNTADA -->
        <div class="preview-bar" id="previewBar">
            <img id="previewImg" class="preview-thumb" src="" alt="Vista previa">
            <div class="preview-info">IMAGEN CAPTURADA - LISTA PARA ANÁLISIS</div>
            <button class="preview-close" onclick="cancelarImagen()">✕</button>
        </div>

        <div class="input-panel">
            <!-- BOTÓN DE CÁMARA / SUBIR IMAGEN -->
            <button class="stark-btn icon-btn" onclick="document.getElementById('imageInput').click()" title="Capturar / Adjuntar Imagen">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3.2"/>
                    <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
                </svg>
            </button>

            <!-- INPUT OCULTO DE IMAGEN -->
            <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="procesarImagenSeleccionada(event)">

            <!-- BOTÓN DE MICRÓFONO -->
            <button class="stark-btn icon-btn mic-btn" id="micBtn" onclick="toggleMicrofono()" title="Activar micrófono">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>

            <input type="text" id="userInput" class="stark-input" placeholder="Escriba o hable un comando..." autocomplete="off">
            <button class="stark-btn" onclick="enviarMensaje()">ENVIAR</button>
        </div>
    </div>

    <script>
        const API_URL = "https://jarvis-ai-hud.onrender.com/api/jarvis";

        const chatBox = document.getElementById("chatBox");
        const userInput = document.getElementById("userInput");
        const sysStatus = document.getElementById("sys-status");
        const reactor = document.getElementById("reactor");
        const micBtn = document.getElementById("micBtn");
        
        const previewBar = document.getElementById("previewBar");
        const previewImg = document.getElementById("previewImg");
        const imageInput = document.getElementById("imageInput");

        let recognition = null;
        let isListening = false;
        let currentImageB64 = None = null;

        function obtenerSessionId() {
            let sid = localStorage.getItem("jarvis_session_id");
            if (!sid) {
                sid = "stark_user_" + Math.random().toString(36).substring(2, 9) + "_" + Date.now();
                localStorage.setItem("jarvis_session_id", sid);
            }
            return sid;
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSFX(tipo) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (tipo === 'send') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1600, now + 0.08);
                gain.gain.setValueAtTime(0.12, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (tipo === 'success') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.08);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (tipo === 'mic') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.12);
                gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.12);
                osc.start(now); osc.stop(now + 0.12);
            } else if (tipo === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
            }
        }

        function setEstado(estado, texto) {
            reactor.className = `arc-reactor state-${estado}`;
            sysStatus.innerText = texto;
            if (estado === 'ready') sysStatus.style.color = "rgba(209, 247, 255, 0.7)";
            if (estado === 'listening') sysStatus.style.color = "var(--stark-red)";
            if (estado === 'processing') sysStatus.style.color = "var(--stark-amber)";
            if (estado === 'speaking') sysStatus.style.color = "var(--stark-cyan)";
            if (estado === 'success') sysStatus.style.color = "var(--stark-green)";
            if (estado === 'error') sysStatus.style.color = "var(--stark-red)";
        }

        /* 🖼️ OPTIMIZACIÓN Y COMPRESIÓN DE IMÁGENES */
        function procesarImagenSeleccionada(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    const MAX_WIDTH = 1280;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height = Math.round((height * MAX_WIDTH) / width);
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);

                    currentImageB64 = canvas.toDataURL("image/jpeg", 0.8);
                    previewImg.src = currentImageB64;
                    previewBar.classList.add("active");
                    playSFX("mic");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function cancelarImagen() {
            currentImageB64 = null;
            imageInput.value = "";
            previewBar.classList.remove("active");
        }

        /* 🎙️ CONTROL DE MICRÓFONO */
        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add("active");
                setEstado('listening', 'ESCUCHANDO...');
                playSFX('mic');
            };

            recognition.onresult = (event) => {
                const textoCapturado = event.results[0][0].transcript;
                userInput.value = textoCapturado;
                apagarMicrofono();
                enviarMensaje();
            };

            recognition.onerror = () => apagarMicrofono();
            recognition.onend = () => apagarMicrofono();
        }

        function toggleMicrofono() {
            if (!recognition) {
                alert("Navegador sin soporte de voz.");
                return;
            }
            if (isListening) {
                recognition.stop();
                apagarMicrofono();
            } else {
                try {
                    window.speechSynthesis.cancel();
                    recognition.start();
                } catch(e) { apagarMicrofono(); }
            }
        }

        function apagarMicrofono() {
            isListening = false;
            micBtn.classList.remove("active");
            if (reactor.classList.contains("state-listening")) {
                setEstado('ready', 'ONLINE');
            }
        }

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") enviarMensaje(); });

        function hablarEstiloJarvisLocal(texto) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            let textoLimpio = texto.replace(/```[\s\S]*?```/g, " Código desplegado en consola. ").replace(/[*_#`]/g, "");
            const utterance = new SpeechSynthesisUtterance(textoLimpio);
            utterance.rate = 0.90; utterance.pitch = 0.85; utterance.lang = 'es-ES';
            const voces = window.speechSynthesis.getVoices();
            const vozEspecial = voces.find(v => (v.lang.includes('es') || v.lang.includes('ES')) && (v.name.includes('Pablo') || v.name.includes('Jorge') || v.name.includes('Male') || v.name.includes('Google')));
            if (vozEspecial) utterance.voice = vozEspecial;
            
            utterance.onstart = () => setEstado('speaking', 'VOZ ACTIVA');
            utterance.onend = () => setEstado('ready', 'ONLINE');
            utterance.onerror = () => setEstado('ready', 'ONLINE');
            window.speechSynthesis.speak(utterance);
        }

        if ('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        function tipoEscribir(elemento, texto, actionUrl, callback) {
            let i = 0; elemento.innerText = "";
            
            if (texto.includes("```")) {
                elemento.innerHTML = formatearTextoConCodigo(texto);
                if (actionUrl) agregarBotonAccion(elemento, actionUrl);
                if (callback) callback();
                return;
            }

            const timer = setInterval(() => {
                if (i < texto.length) {
                    elemento.innerText += texto.charAt(i); i++;
                    chatBox.scrollTop = chatBox.scrollHeight;
                } else {
                    clearInterval(timer);
                    if (actionUrl) agregarBotonAccion(elemento, actionUrl);
                    if (callback) callback();
                }
            }, 10);
        }

        function agregarBotonAccion(elemento, url) {
            const btnLink = document.createElement("a");
            btnLink.href = url; btnLink.target = "_blank"; btnLink.className = "hud-link-btn";
            btnLink.innerText = "🚀 ABRIR ENLACE EN PANTALLA";
            elemento.appendChild(document.createElement("br"));
            elemento.appendChild(btnLink);
        }

        function formatearTextoConCodigo(texto) {
            return texto.replace(/```python([\s\S]*?)```/g, '<pre class="code-block"><code>$1</code></pre>')
                        .replace(/```([\s\S]*?)```/g, '<pre class="code-block"><code>$1</code></pre>');
        }

        async function enviarMensaje() {
            const texto = userInput.value.trim();
            const imgEnviar = currentImageB64;

            if (!texto && !imgEnviar) return;

            playSFX('send');
            
            // Renderizar mensaje del usuario en el chat (con miniatura de imagen si existe)
            agregarMensajeUsuario(texto, imgEnviar);
            
            userInput.value = "";
            cancelarImagen();

            setEstado('processing', 'PROCESANDO...');

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        message: texto || "Señor, analice esta imagen por favor.",
                        session_id: obtenerSessionId(),
                        image_b64: imgEnviar
                    })
                });

                const data = await response.json();

                if (data.status === "success") {
                    playSFX('success');
                    const msgDiv = document.createElement("div");
                    msgDiv.className = "message jarvis-message";
                    chatBox.appendChild(msgDiv);

                    if (data.action_url) {
                        try { window.open(data.action_url, '_blank'); } 
                        catch(e) { console.warn("Popup bloqueado."); }
                    }

                    tipoEscribir(msgDiv, data.reply, data.action_url, () => {
                        if (data.audio_b64) {
                            const audio = new Audio(data.audio_b64);
                            audio.volume = 1.0;
                            audio.onplay = () => setEstado('speaking', 'REPRODUCIENDO');
                            audio.onended = () => setEstado('ready', 'ONLINE');
                            audio.onerror = () => { setEstado('ready', 'ONLINE'); hablarEstiloJarvisLocal(data.reply); };
                            audio.play().catch(err => hablarEstiloJarvisLocal(data.reply));
                        } else {
                            hablarEstiloJarvisLocal(data.reply);
                        }
                    });

                } else {
                    setEstado('error', 'FALLO EN RESPUESTA');
                    playSFX('error');
                    agregarMensajeJarvis("[ALERTA]: " + data.reply);
                }
            } catch (error) {
                setEstado('error', 'DESCONEXIÓN');
                playSFX('error');
                agregarMensajeJarvis("[ERROR]: No se pudo conectar con el servidor central en Render.");
            }
        }

        function agregarMensajeUsuario(texto, imgB64) {
            const msgDiv = document.createElement("div");
            msgDiv.className = "message user-message";
            
            if (imgB64) {
                const imgElem = document.createElement("img");
                imgElem.src = imgB64;
                imgElem.className = "chat-img-thumb";
                msgDiv.appendChild(imgElem);
            }
            
            if (texto) {
                const textNode = document.createTextNode(texto);
                msgDiv.appendChild(textNode);
            }

            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function agregarMensajeJarvis(texto) {
            const msgDiv = document.createElement("div");
            msgDiv.className = "message jarvis-message";
            msgDiv.innerText = texto;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
